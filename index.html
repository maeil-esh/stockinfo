<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>UK2 Investment — AI 시장 브리핑</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500;600&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
<style>
:root {
  --bg:       #080c12;
  --bg2:      #0d1320;
  --bg3:      #111827;
  --border:   rgba(255,255,255,0.07);
  --border2:  rgba(255,255,255,0.12);
  --text:     #e8ecf4;
  --muted:    #7a8499;
  --gold:     #c9a84c;
  --gold2:    #f0d080;
  --gold-dim: rgba(201,168,76,0.12);
  --up:       #34d399;
  --down:     #f87171;
  --accent:   #60a5fa;
  --glow:     rgba(201,168,76,0.15);
}

* { margin:0; padding:0; box-sizing:border-box; -webkit-font-smoothing:antialiased; }
body { background:var(--bg); color:var(--text); font-family:'DM Sans', sans-serif; line-height:1.6; overflow-x:hidden; }

/* ── 스켈레톤 & 상태 표시 ── */
.status-indicator { display: flex; align-items: center; gap: 8px; font-size: 13px; font-weight: 500; margin-bottom: 20px; }
.dot { width: 8px; height: 8px; border-radius: 50%; }
.dot.live { background: var(--up); box-shadow: 0 0 10px var(--up); animation: pulse 2s infinite; }
.dot.loading { background: var(--accent); }
.dot.error { background: var(--down); }
@keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.4; } 100% { opacity: 1; } }

/* ── 레이아웃 & 카드 디자인 ── */
.container { max-width: 1200px; margin: 0 auto; padding: 40px 20px; }
.grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 24px; margin-bottom: 60px; }
.card { background: var(--bg2); border: 1px solid var(--border); padding: 30px; border-radius: 4px; position: relative; transition: all 0.3s; }
.card:hover { border-color: var(--gold); transform: translateY(-4px); }
.label { font-family: 'JetBrains Mono', monospace; font-size: 11px; text-transform: uppercase; color: var(--muted); letter-spacing: 0.1em; display: block; margin-bottom: 15px; }
.value { font-family: 'DM Serif Display', serif; font-size: 38px; margin-bottom: 8px; display: block; }
.change { font-size: 15px; font-weight: 600; }
.uc { color: var(--up); }
.dc { color: var(--down); }

/* ── 티커 ── */
.ticker-wrap { background: var(--bg3); border-top: 1px solid var(--border); border-bottom: 1px solid var(--border); padding: 12px 0; overflow: hidden; white-space: nowrap; margin-bottom: 60px; }
.ticker { display: inline-block; animation: ticker 40s linear infinite; padding-left: 100%; }
.ticker span { display: inline-block; margin-right: 50px; font-family: 'JetBrains Mono', monospace; font-size: 13px; }
@keyframes ticker { 0% { transform: translateX(0); } 100% { transform: translateX(-100%); } }

/* ── 히어로 ── */
.hero { text-align: center; margin-bottom: 80px; padding: 100px 0; border-bottom: 1px solid var(--border); }
.hero h1 { font-family: 'DM Serif Display', serif; font-size: clamp(48px, 8vw, 84px); line-height: 1; margin-bottom: 30px; letter-spacing: -0.02em; }
.hero p { color: var(--muted); font-size: 18px; max-width: 600px; margin: 0 auto; }
</style>
</head>
<body>

<div class="container">
  <div class="hero">
    <div class="status-indicator">
      <div id="status-dot" class="dot loading"></div>
      <span id="status-text">CONNECTING TO MARKET...</span>
    </div>
    <h1>Institutional Grade<br><span style="color:var(--gold)">Market Intelligence</span></h1>
    <p>실시간 매크로 지표와 AI 기술을 결합하여 자산 운용의 통찰력을 제공합니다.</p>
  </div>

  <div class="ticker-wrap">
    <div class="ticker" id="ticker-content">
      <span>LOADING REAL-TIME DATA...</span>
    </div>
  </div>

  <div class="grid" id="macro-grid">
    <div class="card" id="card-KS11">
      <span class="label">KOSPI COMPOSITE</span>
      <span class="value" id="val-KS11">---</span>
      <span class="change" id="chg-KS11">---</span>
    </div>
    <div class="card" id="card-KQ11">
      <span class="label">KOSDAQ</span>
      <span class="value" id="val-KQ11">---</span>
      <span class="change" id="chg-KQ11">---</span>
    </div>
    <div class="card" id="card-KRW">
      <span class="label">USD / KRW</span>
      <span class="value" id="val-KRW">---</span>
      <span class="change" id="chg-KRW">---</span>
    </div>
    <div class="card" id="card-CLF">
      <span class="label">WTI CRUDE OIL</span>
      <span class="value" id="val-CLF">---</span>
      <span class="change" id="chg-CLF">---</span>
    </div>
  </div>
</div>

<script>
// ════════════════════════════════════════════════
// UK2 Investment — 데이터 엔진 (CORS & 리다이렉트 완전 해결판)
// ════════════════════════════════════════════════

const SYMBOLS = ['^KS11','^KQ11','KRW=X','CL=F','GC=F','^VIX','^TNX'].join(',');
const GAS_URL = 'https://script.google.com/macros/s/AKfycbyq1pa4yozr_Hmd9rWQ6598dLujxe7tjCMfRRTrPXtKHKJy1eM93FV_n8SmCHUY-cF1BQ/exec';

const fmtNum  = (n, dec=2) => (n !== undefined && n !== null) ? n.toLocaleString('ko-KR', {maximumFractionDigits: dec}) : '0.00';
const fmtPct  = (p) => (p !== undefined && p !== null) ? (p >= 0 ? '+' : '') + p.toFixed(2) + '%' : '0.00%';
const upDown  = (p) => p >= 0 ? 'uc' : 'dc';

function setStatus(state) {
    const dot = document.getElementById('status-dot');
    const txt = document.getElementById('status-text');
    dot.className = 'dot ' + state;
    if(state === 'live') txt.innerText = 'SYSTEM LIVE: REAL-TIME FEED ACTIVE';
    if(state === 'loading') txt.innerText = 'FETCHING MARKET DATA...';
    if(state === 'error') txt.innerText = 'DATA CONNECTION ERROR';
}

async function loadMarketData() {
    setStatus('loading');
    const fetchUrl = `${GAS_URL}?symbols=${encodeURIComponent(SYMBOLS)}&_=${Date.now()}`;

    try {
        const response = await fetch(fetchUrl, {
            method: 'GET',
            mode: 'cors',
            redirect: 'follow', // 302 리다이렉트 해결의 핵심
            cache: 'no-cache'
        });

        if (!response.ok) throw new Error(`HTTP ${response.status}`);
        
        const data = await response.json();
        if (!data.quoteResponse || !data.quoteResponse.result) throw new Error('Invalid Data');
        
        const results = data.quoteResponse.result;
        const d = {};
        results.forEach(r => { d[r.symbol] = r; });

        // UI 업데이트
        updateUI(d);
        setStatus('live');
    } catch (e) {
        console.error('Fetch Error:', e);
        setStatus('error');
    }
}

function updateUI(d) {
    // KOSPI
    if(d['^KS11']) {
        document.getElementById('val-KS11').innerText = fmtNum(d['^KS11'].regularMarketPrice);
        const chg = d['^KS11'].regularMarketChangePercent;
        document.getElementById('chg-KS11').innerText = fmtPct(chg);
        document.getElementById('chg-KS11').className = 'change ' + upDown(chg);
    }
    // KOSDAQ
    if(d['^KQ11']) {
        document.getElementById('val-KQ11').innerText = fmtNum(d['^KQ11'].regularMarketPrice);
        const chg = d['^KQ11'].regularMarketChangePercent;
        document.getElementById('chg-KQ11').innerText = fmtPct(chg);
        document.getElementById('chg-KQ11').className = 'change ' + upDown(chg);
    }
    // USD/KRW
    if(d['KRW=X']) {
        document.getElementById('val-KRW').innerText = fmtNum(d['KRW=X'].regularMarketPrice);
        const chg = d['KRW=X'].regularMarketChangePercent;
        document.getElementById('chg-KRW').innerText = fmtPct(chg);
        document.getElementById('chg-KRW').className = 'change ' + upDown(chg);
    }
    // WTI
    if(d['CL=F']) {
        document.getElementById('val-CLF').innerText = fmtNum(d['CL=F'].regularMarketPrice);
        const chg = d['CL=F'].regularMarketChangePercent;
        document.getElementById('chg-CLF').innerText = fmtPct(chg);
        document.getElementById('chg-CLF').className = 'change ' + upDown(chg);
    }

    // 티커 업데이트
    const ticker = document.getElementById('ticker-content');
    ticker.innerHTML = Object.values(d).map(r => `
        <span>${r.symbol.replace('^','')} ${fmtNum(r.regularMarketPrice)} (<strong class="${upDown(r.regularMarketChangePercent)}">${fmtPct(r.regularMarketChangePercent)}</strong>)</span>
    `).join('');
}

// 초기 로드 및 1분 간격 갱신
loadMarketData();
setInterval(loadMarketData, 60000);

</script>
</body>
</html>
