<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>UK2 Investment — AI 시장 브리핑</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500;600&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
<style>
:root {
  --bg:       #080c12;
  --bg2:      #0d1320;
  --bg3:      #111827;
  --border:   rgba(255,255,255,0.07);
  --border2:  rgba(255,255,255,0.12);
  --text:     #e8ecf4;
  --muted:    #7a8499;
  --gold:     #c9a84c;
  --gold2:    #f0d080;
  --gold-dim: rgba(201,168,76,0.12);
  --up:       #34d399;
  --down:     #f87171;
  --accent:   #60a5fa;
  --glow:     rgba(201,168,76,0.18);
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

html { scroll-behavior: smooth; }

body {
  background: var(--bg);
  color: var(--text);
  font-family: 'DM Sans', sans-serif;
  font-weight: 400;
  line-height: 1.6;
  overflow-x: hidden;
}

/* ── 배경 그리드 텍스처 ── */
body::before {
  content: '';
  position: fixed; inset: 0;
  background-image:
    linear-gradient(rgba(201,168,76,0.03) 1px, transparent 1px),
    linear-gradient(90deg, rgba(201,168,76,0.03) 1px, transparent 1px);
  background-size: 48px 48px;
  pointer-events: none; z-index: 0;
}

/* ── 상단 ticker ── */
.ticker-bar {
  background: var(--bg2);
  border-bottom: 1px solid var(--border);
  overflow: hidden;
  height: 34px;
  position: relative; z-index: 10;
}
.ticker-inner {
  display: flex; align-items: center; gap: 0;
  white-space: nowrap;
  animation: ticker 40s linear infinite;
  height: 100%;
}
@keyframes ticker { 0%{transform:translateX(0)} 100%{transform:translateX(-50%)} }
.tick-item {
  display: inline-flex; align-items: center; gap: 8px;
  padding: 0 28px;
  font-family: 'JetBrains Mono', monospace;
  font-size: 11px; color: var(--muted);
  border-right: 1px solid var(--border);
  height: 100%;
}
.tick-item .sym { color: var(--text); font-weight: 600; }
.tick-item .up-c { color: var(--up); }
.tick-item .dn-c { color: var(--down); }

/* ── NAV ── */
nav {
  position: sticky; top: 0; z-index: 100;
  background: rgba(8,12,18,0.85);
  backdrop-filter: blur(16px);
  border-bottom: 1px solid var(--border);
  padding: 0 5%;
  display: flex; align-items: center; justify-content: space-between;
  height: 64px;
}
.nav-logo {
  font-family: 'DM Serif Display', serif;
  font-size: 20px; letter-spacing: 0.5px;
  color: var(--gold2);
}
.nav-logo span { color: var(--muted); font-size: 11px; font-family: 'DM Sans',sans-serif; display: block; letter-spacing: 2px; font-weight: 400; margin-top: -4px; }
.nav-links { display: flex; gap: 32px; }
.nav-links a { color: var(--muted); text-decoration: none; font-size: 14px; transition: color 0.2s; }
.nav-links a:hover { color: var(--text); }
.nav-cta {
  background: var(--gold);
  color: #080c12; font-weight: 600; font-size: 13px;
  padding: 9px 20px; border-radius: 6px; text-decoration: none;
  transition: background 0.2s, transform 0.1s;
}
.nav-cta:hover { background: var(--gold2); transform: translateY(-1px); }

/* ── HERO ── */
.hero {
  position: relative; z-index: 1;
  min-height: 92vh;
  display: flex; align-items: center;
  padding: 80px 5% 60px;
  overflow: hidden;
}
.hero-bg-glow {
  position: absolute;
  width: 700px; height: 700px;
  background: radial-gradient(circle, rgba(201,168,76,0.10) 0%, transparent 70%);
  top: -100px; right: -100px;
  pointer-events: none;
}
.hero-bg-glow2 {
  position: absolute;
  width: 400px; height: 400px;
  background: radial-gradient(circle, rgba(96,165,250,0.07) 0%, transparent 70%);
  bottom: 0; left: 20%;
  pointer-events: none;
}
.hero-left { flex: 1; max-width: 600px; }
.hero-eyebrow {
  display: inline-flex; align-items: center; gap: 8px;
  background: var(--gold-dim);
  border: 1px solid rgba(201,168,76,0.25);
  border-radius: 20px; padding: 5px 14px;
  font-size: 12px; color: var(--gold); letter-spacing: 1.2px; font-weight: 500;
  margin-bottom: 28px;
  animation: fadeUp 0.6s ease both;
}
.eyebrow-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--gold); animation: pulse 2s infinite; }
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.3} }

.hero h1 {
  font-family: 'DM Serif Display', serif;
  font-size: clamp(42px, 6vw, 72px);
  line-height: 1.08;
  letter-spacing: -1px;
  color: #fff;
  margin-bottom: 24px;
  animation: fadeUp 0.7s 0.1s ease both;
}
.hero h1 em { font-style: italic; color: var(--gold2); }
.hero p.sub {
  font-size: 17px; color: var(--muted); line-height: 1.75;
  max-width: 480px; margin-bottom: 40px;
  animation: fadeUp 0.7s 0.2s ease both;
}
.hero-actions {
  display: flex; gap: 14px; align-items: center;
  animation: fadeUp 0.7s 0.3s ease both;
}
.btn-primary {
  background: var(--gold);
  color: #080c12; font-weight: 700; font-size: 15px;
  padding: 14px 32px; border-radius: 8px; border: none;
  cursor: pointer; text-decoration: none; display: inline-block;
  transition: background 0.2s, transform 0.15s, box-shadow 0.2s;
  box-shadow: 0 0 0 0 rgba(201,168,76,0);
}
.btn-primary:hover { background: var(--gold2); transform: translateY(-2px); box-shadow: 0 8px 30px rgba(201,168,76,0.3); }
.btn-secondary {
  color: var(--muted); font-size: 14px; text-decoration: none;
  display: flex; align-items: center; gap: 6px;
  transition: color 0.2s;
}
.btn-secondary:hover { color: var(--text); }
.btn-secondary svg { transition: transform 0.2s; }
.btn-secondary:hover svg { transform: translateX(3px); }

/* hero 우측 미리보기 카드 */
.hero-right {
  flex: 0 0 420px;
  margin-left: 60px;
  animation: fadeUp 0.8s 0.35s ease both;
}
@media (max-width: 1024px) { .hero-right { display: none; } }

.preview-card {
  background: var(--bg2);
  border: 1px solid var(--border2);
  border-radius: 16px;
  overflow: hidden;
  box-shadow: 0 24px 80px rgba(0,0,0,0.5), 0 0 0 1px rgba(201,168,76,0.06);
}
.preview-topbar {
  background: var(--bg3);
  border-bottom: 1px solid var(--border);
  padding: 12px 16px;
  display: flex; align-items: center; gap: 8px;
}
.p-dot { width: 10px; height: 10px; border-radius: 50%; }
.preview-title { font-size: 11px; color: var(--muted); margin-left: auto; font-family: 'JetBrains Mono', monospace; }
.preview-body { padding: 20px; }
.p-phase {
  display: inline-block; padding: 3px 12px; border-radius: 12px;
  background: rgba(52,211,153,0.12); color: var(--up);
  border: 1px solid rgba(52,211,153,0.25); font-size: 11px; font-weight: 600;
  margin-bottom: 14px;
}
.p-section { font-size: 10px; color: var(--gold); letter-spacing: 1px; font-weight: 600; margin-bottom: 8px; }
.p-row {
  display: flex; justify-content: space-between; align-items: center;
  padding: 7px 0; border-bottom: 1px solid var(--border); font-size: 12px;
}
.p-row:last-child { border-bottom: none; }
.p-name { color: var(--muted); font-family: 'JetBrains Mono', monospace; }
.p-val { color: var(--text); font-weight: 600; font-family: 'JetBrains Mono', monospace; }
.p-chg-up { color: var(--up); font-family: 'JetBrains Mono', monospace; font-size: 11px; }
.p-chg-dn { color: var(--down); font-family: 'JetBrains Mono', monospace; font-size: 11px; }

/* 미니 스파크라인 */
.mini-spark { display: inline-block; vertical-align: middle; margin-left: 8px; }

.p-divider { height: 1px; background: var(--border); margin: 14px 0; }
.p-analysis { font-size: 11px; color: var(--muted); line-height: 1.7; }
.p-analysis strong { color: var(--gold); }
.p-footer { margin-top: 14px; display: flex; align-items: center; gap: 6px; font-size: 10px; color: var(--muted); }
.ai-badge { background: var(--gold-dim); color: var(--gold); border: 1px solid rgba(201,168,76,0.2); border-radius: 4px; padding: 1px 7px; font-size: 10px; }

@keyframes fadeUp { from{opacity:0;transform:translateY(20px)} to{opacity:1;transform:translateY(0)} }

/* ── 실시간 데이터 로딩 ── */
@keyframes shimmer { 0%{opacity:0.3} 50%{opacity:0.8} 100%{opacity:0.3} }
.live-val { transition: all 0.4s ease; }
.loading-val { animation: shimmer 1.2s ease infinite; color: var(--muted) !important; }
.data-bar {
  display: flex; align-items: center; gap: 10px;
  margin-bottom: 12px; flex-wrap: wrap;
}
.data-status-dot { width: 7px; height: 7px; border-radius: 50%; background: var(--muted); flex-shrink: 0; }
.data-status-dot.live { background: var(--up); animation: pulse 2s infinite; }
.data-status-dot.loading { background: var(--gold); animation: pulse 0.7s infinite; }
.data-status-dot.error { background: var(--down); }
.data-status-text { font-size: 11px; color: var(--muted); }
.refresh-btn {
  margin-left: auto; background: var(--bg3); border: 1px solid var(--border2);
  color: var(--muted); font-size: 13px; padding: 4px 12px; border-radius: 6px;
  cursor: pointer; transition: all 0.2s; display: flex; align-items: center; gap: 5px;
}
.refresh-btn:hover { color: var(--text); border-color: var(--gold); }
.refresh-btn.spinning svg { animation: spin 0.8s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }

/* ── STATS ── */
.stats-strip {
  position: relative; z-index: 1;
  border-top: 1px solid var(--border);
  border-bottom: 1px solid var(--border);
  background: var(--bg2);
  display: flex; justify-content: center; flex-wrap: wrap;
  gap: 0;
}
.stat-item {
  padding: 28px 48px; text-align: center;
  border-right: 1px solid var(--border);
  flex: 1; min-width: 180px;
}
.stat-item:last-child { border-right: none; }
.stat-num { font-family: 'DM Serif Display', serif; font-size: 36px; color: var(--gold2); }
.stat-label { font-size: 12px; color: var(--muted); letter-spacing: 0.5px; margin-top: 4px; }

/* ── FEATURES ── */
.section {
  position: relative; z-index: 1;
  padding: 100px 5%;
  max-width: 1200px; margin: 0 auto;
}
.section-label {
  font-size: 11px; letter-spacing: 2px; color: var(--gold);
  font-weight: 600; text-transform: uppercase; margin-bottom: 14px;
}
.section-title {
  font-family: 'DM Serif Display', serif;
  font-size: clamp(32px, 4vw, 52px); line-height: 1.12;
  color: #fff; margin-bottom: 16px;
}
.section-title em { font-style: italic; color: var(--gold2); }
.section-sub { font-size: 16px; color: var(--muted); max-width: 520px; line-height: 1.75; }

.features-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
  gap: 16px; margin-top: 56px;
}
.feature-card {
  background: var(--bg2);
  border: 1px solid var(--border);
  border-radius: 14px; padding: 28px;
  transition: border-color 0.25s, transform 0.2s, box-shadow 0.25s;
  cursor: default;
}
.feature-card:hover {
  border-color: rgba(201,168,76,0.3);
  transform: translateY(-4px);
  box-shadow: 0 16px 48px rgba(0,0,0,0.35);
}
.feature-icon {
  width: 44px; height: 44px; border-radius: 10px;
  background: var(--gold-dim); border: 1px solid rgba(201,168,76,0.2);
  display: flex; align-items: center; justify-content: center;
  font-size: 20px; margin-bottom: 18px;
}
.feature-title { font-size: 16px; font-weight: 600; color: var(--text); margin-bottom: 8px; }
.feature-desc { font-size: 13px; color: var(--muted); line-height: 1.75; }

/* ── HOW IT WORKS ── */
.how-section {
  position: relative; z-index: 1;
  background: var(--bg2);
  border-top: 1px solid var(--border);
  border-bottom: 1px solid var(--border);
  padding: 100px 5%;
}
.how-inner { max-width: 1200px; margin: 0 auto; }
.steps-grid {
  display: grid; grid-template-columns: repeat(4, 1fr);
  gap: 0; margin-top: 60px;
  position: relative;
}
.steps-grid::before {
  content: '';
  position: absolute;
  top: 28px; left: calc(25% / 2);
  width: calc(100% - 25%);
  height: 1px; background: var(--border);
}
.step {
  padding: 0 20px; text-align: center; position: relative;
}
.step-num {
  width: 56px; height: 56px; border-radius: 50%;
  background: var(--bg3); border: 1px solid rgba(201,168,76,0.3);
  display: flex; align-items: center; justify-content: center;
  margin: 0 auto 20px;
  font-family: 'JetBrains Mono', monospace;
  font-size: 16px; font-weight: 600; color: var(--gold);
  position: relative; z-index: 1;
  transition: background 0.2s, box-shadow 0.2s;
}
.step:hover .step-num { background: var(--gold-dim); box-shadow: 0 0 20px rgba(201,168,76,0.2); }
.step-title { font-size: 14px; font-weight: 600; color: var(--text); margin-bottom: 8px; }
.step-desc { font-size: 12px; color: var(--muted); line-height: 1.7; }

@media (max-width: 768px) {
  .steps-grid { grid-template-columns: 1fr 1fr; }
  .steps-grid::before { display: none; }
  .step { padding: 20px; }
}

/* ── SAMPLE 브리핑 ── */
.sample-section {
  position: relative; z-index: 1;
  padding: 100px 5%;
  max-width: 1200px; margin: 0 auto;
}
.sample-tabs {
  display: flex; gap: 4px; margin-top: 48px; margin-bottom: 24px;
  background: var(--bg2); border: 1px solid var(--border);
  border-radius: 10px; padding: 4px; width: fit-content;
}
.sample-tab {
  padding: 8px 20px; border-radius: 7px;
  font-size: 13px; color: var(--muted); cursor: pointer;
  transition: background 0.2s, color 0.2s; border: none; background: none;
}
.sample-tab.active { background: var(--gold); color: #080c12; font-weight: 600; }

.sample-content { display: none; }
.sample-content.active { display: block; }

.sample-card {
  background: var(--bg2); border: 1px solid var(--border2);
  border-radius: 16px; overflow: hidden;
}
.sample-header {
  background: var(--bg3); border-bottom: 1px solid var(--border);
  padding: 16px 24px; display: flex; align-items: center; gap: 12px;
}
.s-badge { padding: 4px 12px; border-radius: 12px; font-size: 11px; font-weight: 700; }
.s-bull { background: rgba(52,211,153,0.12); color: var(--up); border: 1px solid rgba(52,211,153,0.25); }
.s-meta { font-size: 12px; color: var(--muted); }
.s-meta strong { color: var(--text); }
.s-date { margin-left: auto; font-size: 12px; color: var(--muted); font-family: 'JetBrains Mono', monospace; }

.sample-body { padding: 24px; }
.s-section-title { font-size: 10px; color: var(--gold); letter-spacing: 1.5px; font-weight: 600; text-transform: uppercase; margin: 0 0 12px; }
.s-macro-grid {
  display: grid; grid-template-columns: repeat(auto-fill, minmax(100px, 1fr));
  gap: 8px; margin-bottom: 24px;
}
.s-macro {
  background: var(--bg3); border: 1px solid var(--border);
  border-radius: 8px; padding: 10px 12px;
}
.s-macro-lbl { font-size: 10px; color: var(--muted); margin-bottom: 3px; }
.s-macro-val { font-size: 15px; font-weight: 700; color: var(--text); font-family: 'JetBrains Mono', monospace; margin-bottom: 2px; }
.s-macro-chg { font-size: 10px; }
.uc { color: var(--up); } .dc { color: var(--down); }

.s-table { width: 100%; border-collapse: collapse; margin-bottom: 24px; }
.s-table th { font-size: 10px; color: var(--muted); font-weight: 600; letter-spacing: 0.5px; padding: 8px 10px; border-bottom: 1px solid var(--border); text-align: left; }
.s-table th:not(:nth-child(2)) { text-align: right; }
.s-table td { font-size: 12px; padding: 9px 10px; border-bottom: 1px solid rgba(255,255,255,0.04); }
.s-table td:not(:nth-child(2)) { text-align: right; }
.s-table tr:last-child td { border-bottom: none; }
.s-table tr:hover td { background: rgba(255,255,255,0.02); }
.rank { color: var(--muted); font-size: 11px; font-family: 'JetBrains Mono', monospace; }
.star { color: #f0d080; font-size: 10px; }
.mono { font-family: 'JetBrains Mono', monospace; }

.s-analysis-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); gap: 12px; margin-bottom: 20px; }
.s-analysis-card {
  background: var(--bg3); border: 1px solid var(--border);
  border-radius: 10px; padding: 14px;
}
.s-ana-title { font-size: 13px; font-weight: 600; color: var(--accent); margin-bottom: 8px; display: flex; align-items: center; gap: 6px; }
.s-dot { width: 5px; height: 5px; border-radius: 50%; background: var(--accent); }
.s-chips { display: flex; flex-wrap: wrap; gap: 4px; margin-bottom: 8px; }
.chip-l { font-size: 10px; padding: 1px 7px; border-radius: 10px; background: rgba(96,165,250,0.1); color: var(--accent); border: 1px solid rgba(96,165,250,0.2); }
.chip-v { font-size: 10px; padding: 1px 7px; border-radius: 10px; background: var(--gold-dim); color: var(--gold); border: 1px solid rgba(201,168,76,0.2); }
.chip-tag { font-size: 9px; color: var(--muted); }
.s-ana-text { font-size: 11px; color: var(--muted); line-height: 1.7; }

.s-strategy-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
@media (max-width: 640px) { .s-strategy-grid { grid-template-columns: 1fr; } }
.s-strat { border-radius: 10px; padding: 14px; font-size: 12px; line-height: 1.75; }
.s-strat-main { background: rgba(52,211,153,0.05); border: 1px solid rgba(52,211,153,0.18); }
.s-strat-risk { background: rgba(248,113,113,0.05); border: 1px solid rgba(248,113,113,0.18); }
.s-strat-t { font-size: 11px; font-weight: 700; margin-bottom: 6px; display: flex; align-items: center; gap: 5px; }
.s-strat-main .s-strat-t { color: var(--up); }
.s-strat-risk .s-strat-t { color: var(--down); }
.s-strat-body { color: var(--muted); }

/* ── SUBSCRIPTION ── */
.sub-section {
  position: relative; z-index: 1;
  background: var(--bg2);
  border-top: 1px solid var(--border);
  padding: 100px 5%;
}
.sub-inner { max-width: 1200px; margin: 0 auto; }
.plans-grid {
  display: grid; grid-template-columns: repeat(3, 1fr);
  gap: 16px; margin-top: 60px;
}
@media (max-width: 900px) { .plans-grid { grid-template-columns: 1fr; } }
.plan-card {
  background: var(--bg3); border: 1px solid var(--border);
  border-radius: 16px; padding: 32px;
  transition: transform 0.2s, box-shadow 0.2s;
  position: relative; overflow: hidden;
}
.plan-card:hover { transform: translateY(-4px); box-shadow: 0 20px 60px rgba(0,0,0,0.4); }
.plan-card.featured {
  background: linear-gradient(135deg, #0d1a2a, #0d1320);
  border-color: rgba(201,168,76,0.4);
  box-shadow: 0 0 40px rgba(201,168,76,0.08);
}
.plan-card.featured::before {
  content: '';
  position: absolute; top: 0; left: 0; right: 0; height: 2px;
  background: linear-gradient(90deg, transparent, var(--gold), transparent);
}
.plan-badge {
  display: inline-block; padding: 3px 10px; border-radius: 10px; margin-bottom: 16px;
  font-size: 10px; font-weight: 700; letter-spacing: 1px;
  background: var(--gold-dim); color: var(--gold); border: 1px solid rgba(201,168,76,0.3);
}
.plan-name { font-size: 22px; font-weight: 600; color: var(--text); margin-bottom: 6px; }
.plan-desc { font-size: 12px; color: var(--muted); margin-bottom: 24px; line-height: 1.6; }
.plan-price { margin-bottom: 28px; }
.plan-price .amount {
  font-family: 'DM Serif Display', serif;
  font-size: 40px; color: var(--text);
}
.plan-card.featured .plan-price .amount { color: var(--gold2); }
.plan-price .period { font-size: 13px; color: var(--muted); }
.plan-price .free-label { font-family: 'DM Serif Display', serif; font-size: 36px; color: var(--muted); }
.plan-features { list-style: none; margin-bottom: 28px; }
.plan-features li {
  display: flex; align-items: flex-start; gap: 8px;
  font-size: 13px; color: var(--muted); padding: 6px 0;
  border-bottom: 1px solid var(--border);
}
.plan-features li:last-child { border-bottom: none; }
.plan-features li.on { color: var(--text); }
.plan-features li .ck { color: var(--up); font-size: 14px; flex-shrink: 0; margin-top: 1px; }
.plan-features li .xx { color: var(--border2); font-size: 14px; flex-shrink: 0; margin-top: 1px; }
.plan-btn {
  width: 100%; padding: 13px; border-radius: 8px; border: none;
  font-size: 14px; font-weight: 600; cursor: pointer;
  transition: background 0.2s, transform 0.15s;
}
.plan-btn-outline {
  background: transparent; color: var(--muted);
  border: 1px solid var(--border2);
}
.plan-btn-outline:hover { background: rgba(255,255,255,0.04); color: var(--text); }
.plan-btn-gold {
  background: var(--gold); color: #080c12;
}
.plan-btn-gold:hover { background: var(--gold2); transform: translateY(-1px); }

/* ── FORM ── */
.form-section {
  position: relative; z-index: 1;
  padding: 100px 5%;
  max-width: 680px; margin: 0 auto;
}
.form-card {
  background: var(--bg2); border: 1px solid var(--border2);
  border-radius: 20px; padding: 48px;
  box-shadow: 0 0 80px rgba(201,168,76,0.05);
}
.form-title {
  font-family: 'DM Serif Display', serif;
  font-size: 36px; color: #fff; margin-bottom: 8px; text-align: center;
}
.form-sub { font-size: 14px; color: var(--muted); text-align: center; margin-bottom: 36px; }
.form-group { margin-bottom: 16px; }
.form-label { font-size: 12px; color: var(--muted); font-weight: 500; letter-spacing: 0.5px; margin-bottom: 6px; display: block; }
.form-input, .form-select {
  width: 100%; padding: 12px 16px;

.form-check { display: flex; align-items: flex-start; gap: 10px; margin-top: 20px; margin-bottom: 24px; }

footer {

}
.footer-inner { max-width: 1200px; margin: 0 auto; }
.footer-top { display: flex; gap: 60px; flex-wrap: wrap; margin-bottom: 40px; }
.footer-brand { flex: 0 0 260px; }
.footer-logo { font-family: 'DM Serif Display', serif; font-size: 22px; color: var(--gold2); margin-bottom: 10px; }
.footer-tagline { font-size: 13px; color: var(--muted); line-height: 1.7; }
.footer-col h4 { font-size: 11px; letter-spacing: 1.5px; color: var(--gold); font-weight: 600; text-transform: uppercase; margin-bottom: 14px; }

.footer-bottom {

/* ── scroll reveal ── */

@keyframes modalIn { from{opacity:0;transform:scale(0.95) translateY(10px)} to{opacity:1;transform:none} }
.modal-header {

/* 베타 팝업 */

.about-tagline { font-size: 14px; color: var(--muted); font-style: italic; margin-bottom: 22px; padding-left: 2px; }
.about-founded-strip {

/* 타임라인 */

.tl-dot { width: 14px; height: 14px; border-radius: 50%; background: var(--bg3); border: 2px solid var(--border2); flex-shrink: 0; margin-top: 3px; position: relative; z-index: 1; transition: border-color 0.2s; }
.tl-dot.gold { border-color: var(--gold); background: var(--gold-dim); box-shadow: 0 0 8px rgba(201,168,76,0.25); }

/* 핵심 역량 */

/* 연락처 */

}

.beta-note { font-size: 11px; color: #4a5568; margin-top: 14px; line-height: 1.7; }

<script>
// ════════════════════════════════════════════════
// UK2 Investment — 실시간 데이터 엔진 (CORS & 302 리다이렉트 해결)
// ════════════════════════════════════════════════

const SYMBOLS = ['^KS11','^KQ11','KRW=X','CL=F','GC=F','^VIX','^TNX'].join(',');
const GAS_URL = 'https://script.google.com/macros/s/AKfycbyq1pa4yozr_Hmd9rWQ6598dLujxe7tjCMfRRTrPXtKHKJy1eM93FV_n8SmCHUY-cF1BQ/exec';

const fmtNum  = (n, dec=2) => (n !== undefined && n !== null) ? n.toLocaleString('ko-KR', {maximumFractionDigits: dec}) : '0.00';
const fmtPct  = (p) => (p !== undefined && p !== null) ? (p >= 0 ? '+' : '') + p.toFixed(2) + '%' : '0.00%';
const upDown  = (p) => p >= 0 ? 'uc' : 'dc';

function setStatus(state) {
  const dot  = document.getElementById('status-dot');
  const text = document.getElementById('status-text');
  const btn  = document.getElementById('refresh-btn');
  if (state === 'loading') {
    if(dot) dot.className = 'data-status-dot loading';
    if(text) text.textContent = '시장 데이터 불러오는 중...';
    if(btn) btn.classList.add('spinning');
  } else if (state === 'live') {
    if(dot) dot.className = 'data-status-dot live';
    const now = new Date();
    if(text) text.textContent = `실시간 동기화 완료 (${now.toLocaleTimeString('ko-KR', {hour:'2-digit', minute:'2-digit'})})`;
    if(btn) btn.classList.remove('spinning');
  } else {
    if(dot) dot.className = 'data-status-dot error';
    if(text) text.textContent = '연결 오류 — 새로고침을 눌러주세요';
    if(btn) btn.classList.remove('spinning');
  }
}

async function loadMarketData() {
  setStatus('loading');
  try {
    const response = await fetch(`${GAS_URL}?symbols=${encodeURIComponent(SYMBOLS)}&t=${Date.now()}`, {
      method: 'GET',
      mode: 'cors',
      redirect: 'follow', // 구글 서버의 302 리다이렉트 자동 추적
      cache: 'no-cache'
    });
    if (!response.ok) throw new Error(`HTTP ${response.status}`);
    const data = await response.json();
    const results = data.quoteResponse.result;
    const d = {};
    results.forEach(r => d[r.symbol] = r);

    updateMacroCards(d);
    updateHeroCard(d);
    updateSampleMacro(d);
    buildTicker(d);
    setStatus('live');
  } catch (e) {
    console.error('Data Load Error:', e.message);
    setStatus('error');
  }
}

function updateMacroCards(d) {
  const cards = [
    { id: 'kospi',  sym: '^KS11', fmt: v => fmtNum(v, 2) },
    { id: 'kosdaq', sym: '^KQ11', fmt: v => fmtNum(v, 2) },
    { id: 'krw',    sym: 'KRW=X', fmt: v => fmtNum(v, 0) + '원' },
    { id: 'wti',    sym: 'CL=F',  fmt: v => '$' + v.toFixed(1) },
    { id: 'vix',    sym: '^VIX',  fmt: v => v.toFixed(2) },
    { id: 'us10y',  sym: '^TNX',  fmt: v => v.toFixed(2) + '%' },
    { id: 'gold',   sym: 'GC=F',  fmt: v => '$' + fmtNum(v, 0) },
  ];
  cards.forEach(({ id, sym, fmt }) => {
    const q = d[sym]; if (!q) return;
    const pEl = document.getElementById('mc-' + id + '-price');
    const dEl = document.getElementById('mc-' + id + '-day');
    if (pEl) { pEl.textContent = fmt(q.regularMarketPrice); pEl.classList.remove('loading-val'); }
    if (dEl) { dEl.textContent = '당일 ' + fmtPct(q.regularMarketChangePercent); dEl.className = 'live-val ' + upDown(q.regularMarketChangePercent); }
  });
}

function updateHeroCard(d) {
  const q = (sym) => d[sym];
  const set = (pId, cId, sym, fmt) => {
    const data = q(sym); if (!data) return;
    const pEl = document.getElementById(pId);
    const cEl = document.getElementById(cId);
    if(pEl) pEl.textContent = fmt(data.regularMarketPrice);
    if(cEl) {
      cEl.textContent = fmtPct(data.regularMarketChangePercent);
      cEl.className = data.regularMarketChangePercent >= 0 ? 'p-chg-up' : 'p-chg-dn';
    }
  };
  set('pv-kospi', 'pv-kospi-chg', '^KS11', v => fmtNum(v, 2));
  set('pv-krw', 'pv-krw-chg', 'KRW=X', v => fmtNum(v, 0));
  set('pv-wti', 'pv-wti-chg', 'CL=F', v => '$' + v.toFixed(1));
  set('pv-gold', 'pv-gold-chg', 'GC=F', v => '$' + fmtNum(v, 0));
}

function updateSampleMacro(d) {
  const rows = [
    { id: 'sm-kospi', sym: '^KS11' }, { id: 'sm-kosdaq', sym: '^KQ11' },
    { id: 'sm-krw', sym: 'KRW=X' }, { id: 'sm-wti', sym: 'CL=F' },
    { id: 'sm-vix', sym: '^VIX' }, { id: 'sm-us10y', sym: '^TNX' },
    { id: 'sm-gold', sym: 'GC=F' }
  ];
  rows.forEach(({ id, sym }) => {
    const q = d[sym]; if (!q) return;
    const vEl = document.getElementById(id);
    const cEl = document.getElementById(id + '-chg');
    if (vEl) vEl.textContent = (sym==='KRW=X'||sym==='GC=F') ? fmtNum(q.regularMarketPrice, 0) : fmtNum(q.regularMarketPrice, 2);
    if (cEl) { cEl.textContent = fmtPct(q.regularMarketChangePercent); cEl.className = 's-macro-chg ' + upDown(q.regularMarketChangePercent); }
  });
}

function buildTicker(d) {
  const ticker = document.getElementById('ticker'); if(!ticker) return;
  ticker.innerHTML = '';
  const items = Object.values(d).map(q => ({
    sym: q.symbol.replace('^',''), val: fmtNum(q.regularMarketPrice, 1), pct: q.regularMarketChangePercent
  }));
  [...items, ...items].forEach(t => {
    const el = document.createElement('div');
    el.className = 'tick-item';
    el.innerHTML = `<span class="sym">${t.sym}</span><span>${t.val}</span><span class="${t.pct>=0?'up-c':'dn-c'}">${fmtPct(t.pct)}</span>`;
    ticker.appendChild(el);
  });
}

function switchTab(name) {
  document.querySelectorAll('.sample-tab').forEach(b => b.classList.remove('active'));
  document.querySelectorAll('.sample-content').forEach(c => c.classList.remove('active'));
  event.target.classList.add('active');
  document.getElementById('tab-' + name).classList.add('active');
  if(typeof drawAllSparks === 'function') drawAllSparks();
}

function openModal(name) { document.getElementById('modal-'+name).classList.add('open'); document.body.style.overflow='hidden'; }
function closeModal(name) { document.getElementById('modal-'+name).classList.remove('open'); document.body.style.overflow=''; }

const observer = new IntersectionObserver(entries => {
  entries.forEach(e => {
    if(e.isIntersecting) {
      e.target.classList.add('visible');
      if(e.target.id === 'cnt-subscribers') {
        let cur = 0; const target = 2847;
        const t = setInterval(() => {
          cur += Math.ceil(target/50); if(cur >= target) { cur = target; clearInterval(t); }
          e.target.textContent = cur.toLocaleString() + '명';
        }, 30);
      }
      observer.unobserve(e.target);
    }
  });
}, {threshold: 0.12});

function drawSpark(canvas) {
  const pts = canvas.dataset.pts.split(',').map(Number);
  const up = canvas.dataset.up === '1';
  const W = canvas.width, H = canvas.height, pad = 3;
  const ctx = canvas.getContext('2d'); ctx.clearRect(0,0,W,H);
  const mn = Math.min(...pts), mx = Math.max(...pts), range = mx - mn || 1;
  const xs = pts.map((_,i) => pad + i*(W-pad*2)/(pts.length-1));
  const ys = pts.map(v => H - pad - (v-mn)/range*(H-pad*2));
  const col = up ? '#34d399' : '#f87171';
  ctx.beginPath(); ctx.moveTo(xs[0], H); xs.forEach((x,i) => ctx.lineTo(x, ys[i])); ctx.lineTo(xs[xs.length-1], H); ctx.closePath();
  ctx.fillStyle = up ? 'rgba(52,211,153,0.12)' : 'rgba(248,113,113,0.12)'; ctx.fill();
  ctx.beginPath(); xs.forEach((x,i) => i===0 ? ctx.moveTo(x,ys[i]) : ctx.lineTo(x,ys[i]));
  ctx.strokeStyle = col; ctx.lineWidth = 1.5; ctx.lineJoin = 'round'; ctx.stroke();
}
function drawAllSparks() { document.querySelectorAll('.sparkcanvas').forEach(drawSpark); }

function submitForm() {
  const name  = document.getElementById('f-name').value.trim();
  const email = document.getElementById('f-email').value.trim();
  const agree = document.getElementById('f-agree').checked;
  if(!name)  { alert('이름을 입력해주세요.'); return; }
  if(!email || !email.includes('@')) { alert('올바른 이메일 주소를 입력해주세요.'); return; }
  if(!agree) { alert('이용약관에 동의해주세요.'); return; }
  document.getElementById('formContent').style.display='none';
  document.getElementById('successMsg').style.display='block';
}

window.addEventListener('DOMContentLoaded', () => {
  document.querySelectorAll('.reveal').forEach(el => observer.observe(el));
  loadMarketData();
  drawAllSparks();
});
</script>
